[Rainmeter]
Update=50
AccurateText=1
DynamicWindowSize=1
BackgroundMode=2
SolidColor=0,0,0,255

[Metadata]
Name=RainMatrix
Author=outlawishhh
Version=1.1
License=Creative Commons Attribution
Information=a cmatrix skin for rainmeter

; variables
[Variables]
MatrixWidth=350
MatrixHeight=300
MatrixColumns=10
BackColor=0,0,0,255
CharColor=0,255,0,255
FadeColor=0,180,0,150

; window properties
TerminalTitle=Terminal 
WindowBorderColor=0,0,0,0
WindowTitleHeight=22
WindowBorderWidth=1

[WindowBorder]
Meter=Shape
Shape=Rectangle 0,0,#MatrixWidth#,(#MatrixHeight# + #WindowTitleHeight# + #WindowBorderWidth#),#WindowBorderWidth# | StrokeWidth #WindowBorderWidth# | Stroke Color #WindowBorderColor# | Fill Color #BackColor#
DynamicVariables=1

[TitleBarBackground]
Meter=Shape
Shape=Rectangle #WindowBorderWidth#,#WindowBorderWidth#,(#MatrixWidth# - (#WindowBorderWidth# * 2)),#WindowTitleHeight# | StrokeWidth 0 | Fill Color 20,80,20,255
DynamicVariables=1

[TitleText]
Meter=String
X=(#MatrixWidth# / 2)
Y=(#WindowTitleHeight# / 2 + #WindowBorderWidth#)
FontFace=Consolas
FontSize=10
FontColor=0,255,0,255
StringStyle=Bold
StringAlign=CenterCenter
Text=#TerminalTitle#
AntiAlias=1

[CloseButton]
Meter=Shape
X=(#MatrixWidth# - 20 - #WindowBorderWidth#)
Y=(#WindowBorderWidth# + 3)
Shape=Rectangle 0,0,16,16,2 | StrokeWidth 1 | Stroke Color 0,200,0,255 | Fill Color 40,100,40,255
DynamicVariables=1
LeftMouseUpAction=[!DeactivateConfig]

[CloseX]
Meter=String
X=(#MatrixWidth# - 12 - #WindowBorderWidth#)
Y=(#WindowBorderWidth# + 10)
FontFace=Consolas
FontSize=10
FontColor=0,255,0,255
StringStyle=Bold
StringAlign=CenterCenter
Text=x
AntiAlias=1

[CommandPrompt]
Meter=String
X=(#WindowBorderWidth# + 10)
Y=(#MatrixHeight# + #WindowTitleHeight# - 20)
FontFace=Consolas
FontSize=10
FontColor=0,255,0,255
StringStyle=Bold
Text=$ SYSTEM_ACCESS: [ACTIVE]
AntiAlias=1
DynamicVariables=1

[StatusText]
Meter=String
X=(#WindowBorderWidth# + 10)
Y=(#MatrixHeight# + #WindowTitleHeight# - 40)
W=(#MatrixWidth# - 20)
FontFace=Consolas
FontSize=9
FontColor=0,200,0,255
Text=NETWORK STATUS: [MeasureStatusMessage]
AntiAlias=1
DynamicVariables=1

[MeasureStatusMessage]
Measure=Calc
Formula=(Random % 5)
Substitute="0":"DECRYPTION IN PROGRESS","1":"SCANNING NETWORK","2":"DATA FLOW STABLE","3":"SECURITY PROTOCOLS ACTIVE","4":"CONNECTION SECURED"
DynamicVariables=1
UpdateDivider=20

[Background]
Meter=Image
X=#WindowBorderWidth#
Y=(#WindowTitleHeight# + #WindowBorderWidth#)
W=#MatrixWidth#
H=#MatrixHeight#
SolidColor=#BackColor#

[MatrixCharacterLeadStyle]
FontFace=Consolas
FontSize=14
FontWeight=700
FontColor=#CharColor#
StringAlign=Center
AntiAlias=1
DynamicVariables=1
ClipString=1

[MatrixCharacterFadeStyle]
FontFace=Consolas
FontSize=14
FontWeight=400
FontColor=#FadeColor#
StringAlign=Center
AntiAlias=1
DynamicVariables=1
ClipString=1

[MatrixCol1Lead]
Meter=String
MeterStyle=MatrixCharacterLeadStyle
X=(#MatrixWidth# / #MatrixColumns# * 0.5)
Y=([MeasureCol1Y] % #MatrixHeight# + #WindowTitleHeight# + #WindowBorderWidth#)
Text=[MeasureCol1Char]

[MatrixCol1Fade1]
Meter=String
MeterStyle=MatrixCharacterFadeStyle
X=(#MatrixWidth# / #MatrixColumns# * 0.5)
Y=(([MeasureCol1Y] + 20) % #MatrixHeight# + #WindowTitleHeight# + #WindowBorderWidth#)
Text=[MeasureCol1Char2]

[MatrixCol1Fade2]
Meter=String
MeterStyle=MatrixCharacterFadeStyle
X=(#MatrixWidth# / #MatrixColumns# * 0.5)
Y=(([MeasureCol1Y] + 40) % #MatrixHeight# + #WindowTitleHeight# + #WindowBorderWidth#)
